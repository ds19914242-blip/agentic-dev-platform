<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Agentic Console</title>
<style>
:root{
  --bg:#0b0e14;--panel:#11151f;--panel2:#0d1117;--line:#1e2530;--line2:#2a3340;
  --txt:#e6edf3;--dim:#9aa7b4;--faint:#5b6675;
  --amber:#f5a524;--teal:#2dd4bf;--red:#f0626e;--blue:#5b9dff;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--ui);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
button{font-family:var(--ui);cursor:pointer}
.mono{font-family:var(--mono)}
#banner{display:none;background:#3a2e0a;color:#f5d990;border-bottom:1px solid #5a4a12;padding:8px 16px;font-size:13px}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:var(--panel2);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.04em}
.brand .dot{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--amber),var(--teal))}
.brand .v{margin-left:auto;font-size:11px;color:var(--faint);font-family:var(--mono)}
.side .lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px}
select,input,textarea{background:var(--panel);border:1px solid var(--line2);color:var(--txt);border-radius:7px;padding:9px 10px;font-size:13px;width:100%;font-family:var(--ui)}
textarea{resize:vertical;min-height:84px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:var(--dim);cursor:pointer}
.nav a:hover{background:var(--panel);color:var(--txt)}
.nav a.on{background:var(--panel);color:var(--txt)}
.nav a .b{width:6px;height:6px;border-radius:50%;background:var(--faint)}
.nav a.on .b{background:var(--amber)}
.side .foot{margin-top:auto;font-size:11px;color:var(--faint);font-family:var(--mono)}
.main{padding:24px 30px;overflow:auto}
.eyebrow{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
h1{font-size:22px;margin:0 0 16px}
h2{font-size:15px;margin:0 0 10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:18px}
.tag{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:2px 7px;margin:0 5px 5px 0}
.pill{display:inline-block;font-family:var(--mono);font-size:11px;border-radius:20px;padding:2px 10px;border:1px solid var(--line2);color:var(--dim)}
.pill.ok{color:var(--teal);border-color:#1c5249}
.pill.warn{color:var(--amber);border-color:#5a4412}
.pill.bad{color:var(--red);border-color:#5a2026}
.btn{background:var(--amber);color:#1a1205;border:none;border-radius:8px;padding:10px 15px;font-weight:600;font-size:13px}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.muted{color:var(--dim)}
.empty{color:var(--faint);padding:22px;text-align:center;border:1px dashed var(--line2);border-radius:9px}
.log{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--mono);font-size:12px;max-height:230px;overflow:auto}
#etasklog.docklog{position:fixed;left:264px;right:18px;bottom:16px;z-index:50;max-height:42vh;box-shadow:0 16px 40px rgba(0,0,0,.6);border-color:var(--amber)}
.log .l{white-space:pre-wrap;color:var(--dim)}.log .l .t{color:var(--faint);margin-right:8px}
.log .l.ok{color:var(--teal)}.log .l.err{color:var(--red)}.log .l.skip{color:var(--amber)}
.repo-card{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1px solid var(--line);border-radius:11px;background:var(--panel);margin-bottom:12px;cursor:pointer}
.repo-card:hover{border-color:var(--line2)}
.badge{width:40px;height:40px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--amber)}
.rn{font-weight:600}.rp{font-family:var(--mono);font-size:12px;color:var(--dim);word-break:break-all}
.prodbar{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:14px 16px;margin-bottom:16px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:0 0 16px;flex-wrap:wrap}
.tabs button{background:none;border:none;color:var(--dim);padding:9px 13px;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--txt);border-bottom-color:var(--amber)}
.split{display:grid;grid-template-columns:300px 1fr;gap:14px}
.tree{border:1px solid var(--line);border-radius:9px;background:var(--panel2);max-height:560px;overflow:auto;padding:6px}
.trow{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;color:var(--dim);cursor:pointer;white-space:nowrap}
.trow:hover{background:var(--panel)}.trow.on{background:var(--panel);color:var(--txt)}
.trow .ic{width:13px;color:var(--faint);text-align:center}
.viewer{border:1px solid var(--line);border-radius:9px;background:var(--panel2);min-height:200px;overflow:auto}
.viewer .vh{padding:8px 12px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;color:var(--dim)}
.code{margin:0;padding:12px;font-family:var(--mono);font-size:12.5px;line-height:1.55;white-space:pre;overflow:auto;color:var(--txt)}
.code .ln{color:var(--faint);display:inline-block;width:38px;user-select:none}
.diff .add{background:rgba(45,212,191,.10);color:#9fe7da;display:block}
.diff .del{background:rgba(240,98,110,.12);color:#f3a3aa;display:block}
.diff .hdr{color:var(--faint);display:block}
.md{padding:16px;line-height:1.65}
.md h1,.md h2,.md h3{margin:16px 0 8px}.md h1{font-size:19px}.md h2{font-size:16px}.md h3{font-size:14px}
.md code{font-family:var(--mono);background:var(--panel);padding:1px 5px;border-radius:4px;font-size:12.5px}
.md pre{background:var(--panel);padding:12px;border-radius:7px;overflow:auto}
.md ul{padding-left:20px}.md li{margin:3px 0}
.cat{margin-bottom:14px}.cat h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin:0 0 6px}
.fl{font-family:var(--mono);font-size:12px;color:var(--dim);padding:2px 0;cursor:pointer}.fl:hover{color:var(--txt)}
.rail{display:flex;gap:0;margin-bottom:18px;flex-wrap:wrap}
.station{flex:1;min-width:120px;padding:10px;border:1px solid var(--line);border-right:none;background:var(--panel2)}
.station:last-child{border-right:1px solid var(--line);border-radius:0 9px 9px 0}.station:first-child{border-radius:9px 0 0 9px}
.station .s-st{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.station .s-lb{font-size:13px;margin-top:3px}
.station.done{border-top:2px solid var(--teal)}.station.done .s-st{color:var(--teal)}
.station.current{border-top:2px solid var(--amber)}.station.current .s-st{color:var(--amber)}
.epic-row{display:flex;gap:10px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);margin-bottom:8px;cursor:pointer}
.epic-row:hover{border-color:var(--line2)}
.epic-row .er-t{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.stat .s{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px 18px;min-width:120px}
.stat .s .n{font-size:24px;font-weight:700}.stat .s .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.note{font-size:12px;color:var(--faint);font-family:var(--mono);margin-bottom:12px}
.banner-soft{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:14px;color:var(--dim)}
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.col{flex:0 0 270px;min-width:270px}
.col-h{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:0 0 8px;display:flex;justify-content:space-between}
.tcard{border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:11px;margin-bottom:8px}
.tcard .tt{font-size:13px;margin-bottom:6px}
.tcard .te{font-size:11px;color:var(--faint);font-family:var(--mono);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col.blocked .col-h{color:var(--red)}.col.ready .col-h{color:var(--teal)}.col.in_progress .col-h{color:var(--amber)}
.runpanel{border:1px solid var(--amber);border-radius:9px;background:var(--panel);padding:12px;margin-bottom:14px}
.runrow{border:1px solid var(--line);border-radius:7px;background:var(--panel2);padding:8px;margin-top:8px}
.runlog{max-height:150px;overflow:auto;margin-top:6px}
.tcard.clickable{cursor:pointer}.tcard.clickable:hover{border-color:var(--line2)}
.tcard.running{border-color:var(--amber)}
.tdetail .filerow{font-family:var(--mono);font-size:12px;color:var(--dim);padding:4px 6px;border-radius:5px;cursor:pointer}
.tdetail .filerow:hover,.tdetail .filerow.on{background:var(--panel);color:var(--txt)}
@media(max-width:760px){.app{grid-template-columns:1fr}.side{flex-direction:row;flex-wrap:wrap}.side .foot{display:none}.split{grid-template-columns:1fr}#etasklog.docklog{left:8px;right:8px}}
</style>
</head>
<body>
<div id="banner"></div>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot"></span> AGENTIC <span class="v" id="pver"></span></div>
    <div><div class="lbl">Active product</div><select id="product-sel" onchange="onProductChange()"></select></div>
    <div><div class="lbl">Platform</div><div class="nav"><a data-v="repos" onclick="go('repos')"><span class="b"></span> Repositories</a></div></div>
    <div id="prod-nav"><div class="lbl">Product</div><div class="nav">
      <a data-v="dashboard" onclick="go('dashboard')"><span class="b"></span> Dashboard</a>
      <a data-v="inbox" onclick="go('inbox')"><span class="b"></span> Бэклог</a>
      <a data-v="repository" onclick="go('repository')"><span class="b"></span> Repository</a>
      <a data-v="activity" onclick="go('activity')"><span class="b"></span> Activity</a>
    </div></div>
    <div id="side-epics-box" style="display:none">
      <div class="lbl" style="display:flex;justify-content:space-between;align-items:center">Epics
        <span style="cursor:pointer;font-size:12px;opacity:.6" onclick="loadSideEpics()" title="refresh">↻</span></div>
      <div class="nav" id="side-epics" style="max-height:38vh;overflow:auto"></div>
    </div>
    <div id="side-preview-box" style="display:none"><div class="lbl">Local preview</div>
      <div class="nav" id="side-preview"></div></div>
    <div class="foot" id="foot">api —</div>
  </aside>

  <main class="main">
    <section id="view-repos" style="display:none">
      <div class="eyebrow">Platform</div><h1>Repositories</h1>
      <div id="repos"></div>
      <div class="card" style="margin-top:18px"><h2>Connect a repository</h2>
        <div class="lbl" style="margin-top:8px">Local repo path</div>
        <input id="c-path" placeholder="/Users/you/Projects/my-app" oninput="onPathInput()"/>
        <div class="lbl" style="margin-top:10px">Product name (used as the id)</div>
        <input id="c-name" placeholder="my-app"/>
        <div class="lbl" style="margin-top:10px">Framework</div>
        <select id="c-fw"><option>nextjs</option><option>node</option><option>python</option><option>other</option></select>
        <div class="row" style="margin-top:13px"><button class="btn" onclick="connectRepo(this)">Connect repository</button>
          <span class="muted" style="font-size:12px">Writes products/&lt;name&gt;/config.yaml with default validators.</span></div>
        <div class="log" id="connect-log" style="display:none;margin-top:12px"></div>
      </div>
    </section>

    <div id="prod-bar" class="prodbar" style="display:none"></div>

    <section id="view-dashboard" style="display:none"><div id="pane-dashboard"></div></section>

    <section id="view-inbox" style="display:none"><div id="pane-inbox"></div></section>

    <section id="view-epic" style="display:none"><div id="epic-pane"></div></section>

    <section id="view-overview" style="display:none"><div id="pane-overview"></div></section>

    <section id="view-repository" style="display:none">
      <div class="tabs"><button data-st="files" onclick="sub('repository','files')">Files</button>
        <button data-st="structure" onclick="sub('repository','structure')">Structure</button>
        <button data-st="analysis" onclick="sub('repository','analysis')">Analysis</button></div>
      <div id="pane-files" style="display:none"></div>
      <div id="pane-structure" style="display:none"></div>
      <div id="pane-analysis" style="display:none"></div>
    </section>

    <section id="view-planning" style="display:none">
      <div class="tabs"><button data-st="epics" onclick="sub('planning','epics')">Epics</button>
        <button data-st="backlog" onclick="sub('planning','backlog')">Board</button></div>
      <div id="pane-epics" style="display:none"></div>
      <div id="pane-backlog" style="display:none"></div>
    </section>

    <section id="view-activity" style="display:none">
      <div class="tabs"><button data-st="changes" onclick="sub('activity','changes')">Changes</button>
        <button data-st="history" onclick="sub('activity','history')">History</button></div>
      <div id="pane-changes" style="display:none"></div>
      <div id="pane-history" style="display:none"></div>
    </section>
  </main>
</div>

<script>
const FE_VERSION="workspace-51";
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
let STATE={products:[]},CUR="",VIEW="repos",EPIC=null;
let EPIC_TASKS=[],EPIC_TASK_VIEW="board",EPIC_STATIONS=[],EPIC_KIND="",ARCH_OPEN=false;
const SUBS={repository:["files","structure","analysis"],planning:["epics","backlog"],activity:["changes","history"]};
const SUBSTATE={repository:"files",planning:"epics",activity:"changes"};
const LOADERS={dashboard:loadDashboard,inbox:loadInbox,overview:loadOverview,files:loadFiles,structure:loadStructure,analysis:loadAnalysis,epics:loadEpics,backlog:loadBacklog,changes:loadChanges,history:loadHistory};

async function api(p,opt){const r=await fetch(p,opt);const t=await r.text();try{return JSON.parse(t)}catch(e){return{error:t||("HTTP "+r.status)}}}
function toast(m){const b=$("#banner");if(b.dataset.sticky==="1")return;b.style.display="";b.textContent=m;setTimeout(()=>{b.style.display="none"},4000)}
function logLine(id,ts,msg,cls){const d=document.createElement("div");d.className="l "+(cls||"");d.innerHTML='<span class="t">'+esc(ts||"")+'</span>'+esc(msg);$(id).appendChild(d);$(id).scrollTop=$(id).scrollHeight}
function mdToHtml(md){md=esc(md||"");const lines=md.split("\n");let out=[],ul=false,pre=false;
  for(let ln of lines){
    if(ln.trim().startsWith("```")){pre=!pre;out.push(pre?"<pre><code>":"</code></pre>");continue}
    if(pre){out.push(ln);continue}
    if(/^### /.test(ln)){out.push("<h3>"+ln.slice(4)+"</h3>");continue}
    if(/^## /.test(ln)){out.push("<h2>"+ln.slice(3)+"</h2>");continue}
    if(/^# /.test(ln)){out.push("<h1>"+ln.slice(2)+"</h1>");continue}
    if(/^[-*] /.test(ln)){if(!ul){out.push("<ul>");ul=true}out.push("<li>"+il(ln.slice(2))+"</li>");continue}
    if(ul){out.push("</ul>");ul=false}
    out.push(ln.trim()===""?"<br>":"<div>"+il(ln)+"</div>");
  }
  if(ul)out.push("</ul>");if(pre)out.push("</code></pre>");return out.join("");
  function il(s){return s.replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>")}}
function codeBlock(t){return '<pre class="code">'+(t||"").split("\n").slice(0,6000).map((l,i)=>'<span class="ln">'+(i+1)+'</span>'+esc(l)).join("\n")+'</pre>'}
function diffBlock(d){return '<pre class="code diff">'+(d||"").split("\n").map(l=>{let c="";if(l.startsWith("+")&&!l.startsWith("+++"))c="add";else if(l.startsWith("-")&&!l.startsWith("---"))c="del";else if(l.startsWith("@@")||l.startsWith("diff ")||l.startsWith("index "))c="hdr";return '<span class="'+c+'">'+esc(l||" ")+'</span>'}).join("")+'</pre>'}
function statusCls(s){return /done|merged|release_confirmed|pr_created|accepted|passed|verified/.test(s||"")?"ok":/fail|block|interrupt/.test(s||"")?"bad":/progress|running|pending|planned|todo/.test(s||"")?"warn":""}

const ART_LABELS={
  "epic.md":"эпик: запрос + контекст продукта",
  "product-spec.md":"Product Agent: проблема, цели, scope (без кода)",
  "feature-spec.md":"Product Analyst: детальная спека фичи (поведение)",
  "acceptance-scenarios.md":"критерии приёмки / сценарии проверки",
  "decomposition.md":"как работа разбита на задачи",
  "dag.json":"граф зависимостей задач",
  "outcome.json":"состояние эпика (planned → … → accepted)",
  "product-status.txt":"маркер гейта product (pending/approved)",
  "spec-status.txt":"маркер гейта spec (pending/approved)",
  "product.txt":"к какому продукту относится эпик",
  "validation-report.md":"отчёт валидации: ошибки tsc/build на ветке эпика",
};
function artLabel(n){if(ART_LABELS[n])return ART_LABELS[n];if(/^task-\d+\.md$/.test(n))return "отдельная задача";return ""}

// stream a job's progress via SSE into a log element; call onDone(result) at end
function runJob(endpoint,payload,logSel,onDone){
  const el=$(logSel);el.style.display="";el.innerHTML="";
  const dock=(logSel==="#etasklog");
  if(dock)el.classList.add("docklog");
  const undock=()=>{if(dock)el.classList.remove("docklog");};
  logLine(logSel,"","Dispatching…");
  return api(endpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(r=>{
      if(r.error){logLine(logSel,"",r.error,"err");undock();if(onDone)onDone({ok:false});return}
      if(r.started===false)logLine(logSel,"","(attaching to a run already in progress)","skip");
      const es=new EventSource("/api/job/stream?id="+encodeURIComponent(r.job_id));
      es.onmessage=e=>{try{const l=JSON.parse(e.data);logLine(logSel,l.ts,l.msg,l.level)}catch(_){}};
      es.addEventListener("done",e=>{es.close();undock();let res={};try{res=JSON.parse(e.data)}catch(_){}if(onDone)onDone(res)});
      es.onerror=()=>{es.close();undock();if(onDone)onDone({ok:false,error:"stream lost"})};
    });
}

async function boot(){
  STATE=await api("/api/state");
  $("#pver").textContent=STATE.version||"";$("#foot").textContent="api "+(STATE.api_version||"?");
  if(STATE.api_version&&STATE.api_version!==FE_VERSION){const b=$("#banner");b.dataset.sticky="1";b.style.display="";b.textContent="⚠ API version mismatch: frontend "+FE_VERSION+", backend "+STATE.api_version+". Обнови server.py или index.html.";}
  $("#product-sel").innerHTML=(STATE.products||[]).map(p=>'<option>'+esc(p.name)+'</option>').join("");
  CUR=(STATE.products[0]||{}).name||"";
  loadSideEpics();
  window.addEventListener("hashchange",applyRoute);
  if(!STATE.products.length){go("repos");return}
  applyRoute();
}
function applyRoute(){
  const h=(location.hash||"").replace(/^#\/?/,"");
  const m=h.match(/^epic\/(.+)$/);
  if(m){openEpic(decodeURIComponent(m[1]));return}
  go(["dashboard","inbox","repository","activity","repos"].includes(h)?h:"dashboard");
}
function setHash(h){if((location.hash||"").replace(/^#\/?/,"")!==h)history.replaceState(null,"","#/"+h);}
function curProduct(){return (STATE.products||[]).find(p=>p.name===CUR)||{}}
function onProductChange(){CUR=$("#product-sel").value;EPIC=null;go("dashboard");loadSideEpics();}
function sideStageCls(s){return (s==="pushed"||s==="validated"||s==="previewed")?"ok":s==="assembled"?"warn":""}
function loadSideEpics(){
  if(!CUR){$("#side-epics-box").style.display="none";return}
  api("/api/epics/overview?product="+encodeURIComponent(CUR)).then(r=>{
    const eps=(r.epics||[]);
    const box=$("#side-epics-box");if(box)box.style.display=eps.length?"":"none";
    const el=$("#side-epics");if(!el)return;
    el.innerHTML=eps.map(e=>`<a onclick="openEpic('${esc(e.id)}')" title="${esc(e.request||e.id)}" style="gap:6px">
      <span class="b"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px">${esc((e.request||e.id).slice(0,42))}</span>
      ${e.stage?`<span class="pill ${sideStageCls(e.stage)}" style="font-size:9px;padding:1px 5px">${esc(e.stage)}</span>`:""}</a>`).join("")

async function renderTree(container,path,depth){
  const r=await api("/api/repo/tree?product="+encodeURIComponent(CUR)+"&path="+encodeURIComponent(path));
  const box=(typeof container==="string")?$("#"+container):container;
  if(r.error||!r.entries){if(depth===0)box.innerHTML='<div class="empty">'+esc(r.error||"Repository not found on this machine.")+'</div>';return}
  if(depth===0)box.innerHTML="";
  r.entries.forEach(e=>{const row=document.createElement("div");row.className="trow";row.style.paddingLeft=(6+depth*14)+"px";
    row.innerHTML='<span class="ic">'+(e.type==="dir"?"▸":"·")+'</span>'+esc(e.name);box.appendChild(row);
    if(e.type==="dir"){const kids=document.createElement("div");box.appendChild(kids);let open=false;
      row.onclick=()=>{open=!open;row.querySelector(".ic").textContent=open?"▾":"▸";if(open&&!kids.dataset.loaded){kids.dataset.loaded="1";renderTree(kids,e.path,depth+1)}kids.style.display=open?"":"none"}}
    else row.onclick=()=>openFile(e.path,row)});
}

function etaskActions(t){

function drawDag(tasks){
  if(!tasks.length)return '<div class="muted" style="padding:12px">Нет задач.</div>';
  const byNum={};tasks.forEach(t=>byNum[t.num]=t);
  const depth={};
  function dep(n,seen){if(depth[n]!=null)return depth[n];if(seen.has(n))return 0;seen.add(n);
    const ds=(byNum[n].depends_on||[]).filter(x=>byNum[x]);
    const v=ds.length?1+Math.max(...ds.map(x=>dep(x,seen))):0;depth[n]=v;return v;}
  tasks.forEach(t=>dep(t.num,new Set()));
  const layers={};tasks.forEach(t=>{(layers[depth[t.num]]||(layers[depth[t.num]]=[])).push(t)});
  const maxd=Math.max(...Object.keys(layers).map(Number));
  const colW=210,rowH=66,padX=16,padY=16,nodeW=178,nodeH=46;
  const maxRows=Math.max(...Object.values(layers).map(a=>a.length));
  const W=padX*2+(maxd+1)*colW-(colW-nodeW),H=padY*2+maxRows*rowH;
  const pos={};
  for(let d=0;d<=maxd;d++){(layers[d]||[]).forEach((t,i)=>{pos[t.num]={x:padX+d*colW,y:padY+i*rowH}})}
  let edges="",nodes="";
  tasks.forEach(t=>(t.depends_on||[]).forEach(dp=>{if(!pos[dp]||!pos[t.num])return;const a=pos[dp],b=pos[t.num];
    edges+=`<path d="M ${a.x+nodeW} ${a.y+nodeH/2} C ${a.x+nodeW+30} ${a.y+nodeH/2}, ${b.x-30} ${b.y+nodeH/2}, ${b.x} ${b.y+nodeH/2}" fill="none" stroke="var(--line2)" stroke-width="1.5" marker-end="url(#arr)"/>`;}));
  tasks.forEach(t=>{const p=pos[t.num],col=taskColor(t.eff_status);
    nodes+=`<g style="cursor:pointer" onclick="viewArtifact('${esc(EPIC)}','${esc(t.file)}',null)">
      <rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" rx="9" fill="var(--panel)" stroke="${col}" stroke-width="1.5"/>
      <circle cx="${p.x+15}" cy="${p.y+nodeH/2}" r="5" fill="${col}"/>
      <text x="${p.x+28}" y="${p.y+19}" fill="var(--txt)" font-size="11" font-family="var(--ui)">#${t.num}</text>
      <text x="${p.x+28}" y="${p.y+34}" fill="var(--dim)" font-size="10" font-family="var(--ui)">${esc(shortTitle(t).slice(0,21))}</text></g>`;});
  return `<div style="overflow:auto;padding-bottom:4px"><svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="min-width:100%">
    <defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--line2)"/></marker></defs>
    ${edges}${nodes}</svg>
    <div class="muted" style="font-size:11px;margin-top:4px">Узлы кликабельны · цвет = статус (серый todo · синий implemented · жёлтый running · зелёный done/accepted · красный failed)</div></div>`;
}

    <div class="row" style="margin-bottom:10px"><input id="bf" placeholder="filter tasks…" style="width:240px" oninput="renderBoard()"/>
    <button class="btn sm" onclick="runAllReady(this)">Run all ready</button>
    <span class="muted" style="font-size:12px">${BL.length} tasks · ${BL.filter(t=>t.column==="ready").length} ready · ${BL.filter(t=>t.done).length} done</span></div>
    <div id="runpanel" class="runpanel" style="display:none"></div>
    <div id="board" class="board"></div>
    <div id="task-detail" class="tdetail" style="display:none"></div>`;
  renderRunsPanel();renderBoard();
}
function renderBoard(){const q=($("#bf")?.value||"").toLowerCase();
  const list=BL.filter(t=>!q||(t.title+" "+t.epic).toLowerCase().includes(q));
  $("#board").innerHTML=COLS.map(([key,label])=>{
    const items=list.filter(t=>t.column===key);
    return `<div class="col ${key}"><div class="col-h"><span>${label}</span><span>${items.length}</span></div>`+
      (items.length?items.map(t=>tcard(t)).join(""):'<div class="muted" style="font-size:12px;padding:6px">—</div>')+`</div>`;
  }).join("");
}
function tcard(t){
  const blk=(t.blocked_by||[]).length?`<div class="te" style="color:var(--red)">blocked by: ${t.blocked_by.map(n=>"#"+n).join(", ")}</div>`:"";
  const pr=t.pr?`<a class="btn ghost sm" href="${esc(t.pr)}" target="_blank" onclick="event.stopPropagation()">PR ↗</a>`:"";
  let foot="";
  if(t.column==="ready")foot=`<button class="btn sm" onclick="event.stopPropagation();runTask('${esc(t.epic_id)}','${esc(t.file)}')">Run →</button>`;
  else if(t.run_state==="running")foot='<span class="pill warn" style="font-size:10px">running…</span>';
  else if(t.run_state==="implemented")foot=`<span class="pill ok" style="font-size:10px">✓ ${t.run_changed} file(s)</span><button class="btn sm" onclick="event.stopPropagation();acceptTask('${esc(t.epic_id)}','${esc(t.file)}')">Accept</button>`;
  else if(t.run_state==="no_changes")foot=`<span class="pill" style="font-size:10px">no changes</span><button class="btn ghost sm" onclick="event.stopPropagation();acceptTask('${esc(t.epic_id)}','${esc(t.file)}')">Accept</button>`;
  const runningCls=t.run_state==="running"?" running":"";
  return `<div class="tcard clickable${runningCls}" onclick="openTask('${esc(t.epic_id)}','${esc(t.file)}')"><div class="tt">${esc(t.title||t.file)}</div>
    <div class="te">${esc((t.epic||t.epic_id).slice(0,38))}</div>${blk}
    <div class="row"><span class="pill ${statusCls(t.status)}" style="font-size:10px">${esc(t.status||"todo")}</span>${pr}${foot}</div></div>`;
}
/* multi-run streaming panel: fixed height, coalesced heartbeats */
function renderRunsPanel(){const keys=Object.keys(RUNS);const p=$("#runpanel");if(!p)return;
  if(!keys.length){p.style.display="none";p.innerHTML="";return}
  p.style.display="";
  p.innerHTML='<div class="row" style="justify-content:space-between"><b>Active runs · '+keys.length+'</b>'+
    (keys.every(k=>RUNS[k].done)?'<button class="btn ghost sm" onclick="clearRuns()">Clear</button>':'')+'</div>'+
    keys.map(k=>`<div class="runrow"><div class="row" style="justify-content:space-between"><span class="mono" style="font-size:12px">${esc(RUNS[k].file)}</span><span class="pill ${RUNS[k].done?(RUNS[k].ok?'ok':'bad'):'warn'}" style="font-size:10px">${RUNS[k].done?(RUNS[k].ok?'done':'failed'):'running'}</span></div><div class="log runlog" id="rl-${cssId(k)}"></div></div>`).join("");
  keys.forEach(k=>{const el=$("#rl-"+cssId(k));if(el){el.innerHTML=RUNS[k].lines.map(l=>'<div class="l '+(l.level||"")+'"><span class="t">'+esc(l.ts||"")+'</span>'+esc(l.msg)+'</div>').join("");el.scrollTop=el.scrollHeight}});
}
function clearRuns(){Object.keys(RUNS).forEach(k=>{if(RUNS[k].done)delete RUNS[k]});renderRunsPanel()}
function runTask(epicId,file){
  const k=runKey(epicId,file);
  if(RUNS[k]&&!RUNS[k].done){toast("Уже выполняется");return}
  const bt=BL.find(x=>x.epic_id===epicId&&x.file===file);
  if(bt){bt.run_state="running";bt.column="in_progress";renderBoard();}
  RUNS[k]={file,epicId,lines:[],done:false,ok:false,hb:-1};renderRunsPanel();
  const push=(ts,msg,level)=>{const r=RUNS[k];if(/still working/.test(msg)){if(r.hb>=0){r.lines[r.hb]={ts,msg,level};} else {r.hb=r.lines.length;r.lines.push({ts,msg,level});}}else{r.lines.push({ts,msg,level})}renderRunsPanel()};
  push("","Dispatching…","");
  api("/api/task/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({epic_id:epicId,task_file:file})})
    .then(r=>{
      if(r.error){push("",r.error,"err");RUNS[k].done=true;renderRunsPanel();return}
      const es=new EventSource("/api/job/stream?id="+encodeURIComponent(r.job_id));
      es.onmessage=e=>{try{const l=JSON.parse(e.data);push(l.ts,l.msg,l.level)}catch(_){}};
      es.addEventListener("done",e=>{es.close();let res={};try{res=JSON.parse(e.data)}catch(_){}RUNS[k].done=true;RUNS[k].ok=!!res.ok;renderRunsPanel();loadBacklogQuiet();});
      es.onerror=()=>{es.close();RUNS[k].done=true;renderRunsPanel()};
    });
}
function runAllReady(btn){const ready=BL.filter(t=>t.column==="ready");if(!ready.length){toast("Нет готовых задач");return}
  if(!confirm("Запустить все Ready ("+ready.length+") параллельно? Каждая — свой worktree и ветка, main не трогается."))return;
  ready.forEach((t,i)=>setTimeout(()=>runTask(t.epic_id,t.file),i*250));
}
async function loadBacklogQuiet(){const r=await api("/api/backlog?product="+encodeURIComponent(CUR));BL=r.tasks||[];renderBoard();}
/* task drill-in */
async function openTask(epicId,file){
  const d=await api("/api/task?epic_id="+encodeURIComponent(epicId)+"&task_file="+encodeURIComponent(file));
  if(d.error){toast(d.error);return}
  $("#board").style.display="none";$("#runpanel").style.display="none";
  const box=$("#task-detail");box.style.display="";
  const run=d.run||{};const changed=run.changed||[];
  const canRun=!run.state||run.state==="failed"||run.state==="no_changes"||run.state==="implemented";
  const runBtn=canRun?`<button class="btn ghost sm" onclick="runTask('${esc(epicId)}','${esc(file)}');setTimeout(()=>openTask('${esc(epicId)}','${esc(file)}'),400)">${run.state?"Re-run":"Run"} →</button>`:'<span class="pill warn">running…</span>';
  const acceptBtn=(run.state==="implemented"||run.state==="no_changes")?`<button class="btn sm" onclick="acceptTask('${esc(epicId)}','${esc(file)}')">Accept ✓</button>`:(run.state==="accepted"?'<span class="pill ok">accepted</span>':"");
  const resetBtn=run.state?`<button class="btn ghost sm" onclick="resetTask('${esc(epicId)}','${esc(file)}')" title="Сбросить прогон и удалить ветку задачи — можно перезапустить начисто">Вернуть в todo</button>`:"";
  let res="";
  if(run.state==="implemented")res=`<div class="card" style="margin:12px 0"><h2>Result · ${changed.length} file(s) on <span class="mono">${esc(run.branch||"")}</span></h2>
    <div class="split"><div class="tree" id="tfiles">${changed.map(f=>`<div class="filerow" onclick="taskDiff('${esc(epicId)}','${esc(file)}','${esc(f)}',this)">${esc(f)}</div>`).join("")}</div>
    <div class="viewer" id="tdiff"><div class="vh">select a file</div></div></div></div>`;
  else if(run.state==="no_changes")res='<div class="banner-soft" style="margin:12px 0">Агент отработал, но изменений в коде не внёс. Возможно, задача уже выполнена или требует уточнения — посмотри текст задачи ниже.</div>';
  else if(run.state==="failed")res='<div class="banner-soft" style="margin:12px 0;border-color:#5a2026;color:#f3a3aa">Прогон упал: '+esc(run.error||"unknown")+'</div>';
  box.innerHTML=`<div class="row" style="justify-content:space-between;margin-bottom:12px"><button class="btn ghost sm" onclick="backToBoard()">← Board</button><div class="row">${resetBtn}${acceptBtn}${runBtn}</div></div>
    <h1 style="font-size:17px">${esc((d.task&&d.task.title)||file)}</h1>
    <div class="note">${esc(epicId)} / ${esc(file)}</div>
    ${res}
    <div class="card md" style="margin-top:12px">${mdToHtml(d.content||"")}</div>`;
}
async function resetTask(epicId,file){
  if(!confirm("Вернуть задачу в todo? Сбросит прогон, снимет подвисший статус и удалит её ветку — потом можно перезапустить начисто. Остальной эпик не трогается."))return;
  const r=await api("/api/task/reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({epic_id:epicId,task_file:file})});
  if(r&&r.error){toast(r.error);return}
  toast("Задача возвращена в todo"+(r.deleted_branch?" · ветка удалена":""));
  openTask(epicId,file);
  if(typeof loadSideEpics==="function")loadSideEpics();
}
async function acceptTask(epicId,file){
  const r=await api("/api/task/accept",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({epic_id:epicId,task_file:file})});
  if(r.error){toast(r.error);return}
  toast("Accepted — зависимые разблокированы");
  if($("#task-detail")&&$("#task-detail").style.display!=="none")openTask(epicId,file);
  loadBacklogQuiet();
}
function backToBoard(){$("#task-detail").style.display="none";$("#board").style.display="";renderRunsPanel();loadBacklogQuiet();}
function epicBranch(id){const m=(id||"").match(/^(\d{8}-\d{6})/);return "agentic/epic-"+(m?m[1]:(id||"epic").replace(/[^a-zA-Z0-9]+/g,"-").slice(0,24));}
function buildEpic(id,btn){
  if(!confirm("Собрать ветку эпика?\n\nCherry-pick принятых задач по DAG на чистую ветку agentic/epic-…. Без агента (быстро), main не трогается, без PR/merge."))return;
  btn.disabled=true;btn.textContent="Assembling…";
  runJob("/api/epic/build",{epic_id:id},"#epiclog",res=>{
    btn.disabled=false;btn.textContent="Собрать ветку эпика →";
    if(res&&res.ok)toast("Собрано на "+(res.branch||"")+" — "+(res.applied||0)+" задач");
    else if(res&&res.conflict_task)toast("Конфликт на "+res.conflict_task+" — причина в логе ниже");
    else if(res&&res.error)toast(res.error);
    refreshExecGate(id);refreshEpicTasks();
  });
}
function resetEpicRuns(id){
  if(!confirm("Перезапустить эпик по DAG?\n\nСбросит состояние прогонов (.console_runs.json) и удалит ЛОКАЛЬНЫЕ ветки agentic/* этого эпика. main и origin не трогаются."))return;
  api("/api/epic/reset-runs",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({epic_id:id})}).then(r=>{
    if(r.error){toast(r.error);return}toast("Reset — ветка эпика пересоберётся с чистого base");setTimeout(()=>openEpic(id),200);
  });
}
async function taskDiff(epicId,file,path,row){
  document.querySelectorAll("#tfiles .filerow").forEach(r=>r.classList.remove("on"));if(row)row.classList.add("on");
  $("#tdiff").innerHTML='<div class="vh">'+esc(path)+'</div><div class="muted" style="padding:12px">Loading…</div>';
  const r=await api("/api/task/diff?epic_id="+encodeURIComponent(epicId)+"&task_file="+encodeURIComponent(file)+"&path="+encodeURIComponent(path));
  $("#tdiff").innerHTML='<div class="vh">'+esc(path)+'</div>'+(r.error?'<div class="muted" style="padding:12px">'+esc(r.error)+'</div>':diffBlock(r.diff));
}
